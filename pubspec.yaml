name: stream_basquet

description: Plataforma profesional de básquet.

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1

  go_router: ^16.0.0

  google_fonts: ^6.3.0

  intl: ^0.20.2

  flutter_svg: ^2.2.0

  equatable: ^2.0.7

  dio: ^5.9.0

  shared_preferences: ^2.5.3

  logger: ^2.6.1

dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/flags/